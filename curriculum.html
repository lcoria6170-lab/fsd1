    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículum Vitae - Coria Leandro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        /* Header con imagen de perfil */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }
        
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 20px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .header h2 {
            font-size: 1.5em;
            font-weight: 300;
            margin-bottom: 20px;
        }
        
        .contact-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            font-size: 0.95em;
            margin-top: 15px;
        }
        
        .contact-info div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .contact-info strong {
            display: inline-block;
            min-width: 100px;
        }
        
        /* Contenido principal */
        .content {
            padding: 40px 30px;
        }
        
        .section {
            margin-bottom: 35px;
        }
        
        .section-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid #764ba2;
        }
        
        /* Presentación Personal */
        .personal-presentation {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .personal-presentation p {
            margin-bottom: 10px;
            color: #555;
        }
        
        .objectives {
            margin-top: 15px;
        }
        
        .objectives h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .objectives ul {
            list-style: none;
            padding-left: 0;
        }
        
        .objectives li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #555;
        }
        
        .objectives li:before {
            content: "▹";
            position: absolute;
            left: 0;
            color: #667eea;
            font-size: 1.2em;
        }
        
        /* Habilidades */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .skill-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }
        
        .skill-card:hover {
            transform: translateY(-5px);
        }
        
        /* Educación */
        .education-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .education-item h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .education-item .date {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .education-item .orientation {
            color: #666;
            font-style: italic;
            margin-top: 8px;
        }
        
        /* Experiencia */
        .experience-empty {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            color: #666;
            font-style: italic;
        }
        
        /* Referencias */
        .references-empty {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            color: #666;
            font-style: italic;
        }
        
        /* Footer */
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .contact-info {
                flex-direction: column;
                gap: 10px;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
